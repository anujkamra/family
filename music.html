<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:type" content="website">
    <meta property="og:url" content="http://anujkamra.com/alaap-vilaap/">
    <meta property="og:title" content="Alaap Vilaap - Anuj Kamra">
    <meta property="og:description" content="Explore the Five Stages of Lament. A Hindi Rock project by Anuj Kamra.">
    <meta property="og:image" content="http://anujkamra.com/alaap-vilaap/SmokeAndBloodCover_8Ksmall.jpg">

    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="http://anujkamra.com/alaap-vilaap/">
    <meta property="twitter:title" content="Alaap Vilaap - Anuj Kamra">
    <meta property="twitter:description" content="Explore the Five Stages of Lament. A Hindi Rock project by Anuj Kamra.">
    <meta property="twitter:image" content="http://anujkamra.com/alaap-vilaap/SmokeAndBloodCover_8Ksmall.jpg">
    <title>Alaap Vilaap | Anuj Kamra</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            /* Updated Palette: Vibrant Crimson & Deep Red from Artwork */
            --bg-bright: #ff0000;    /* Brightest red, like the blood tear */
            --bg-deep: #4d0000;      /* Deepest shadow red */
            --text-main: #fcfcfc;    /* Very slightly warmer white for main text */
            --text-sub: #f0f0f0;     /* Slightly darker for subtext */
            --glass: rgba(255, 255, 255, 0.08); /* White glass effect */
            --btn-accent: rgba(255, 255, 255, 0.6); /* Translucent btn border */
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main);
            height: 100%;
            overflow-x: hidden;
            /* Vibrant Gradient Background that doesn't rely on the dark blur */
            background: linear-gradient(135deg, var(--bg-deep) 0%, var(--bg-bright) 100%);
        }

        /* Dynamic Blurred Overlay - Keeps the texture but allows the new red through */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Uses the image blur with an additive blend mode to pop the reds */
            background: url('SmokeAndBloodCover_8K.jpg') center/cover no-repeat;
            filter: blur(80px);
            z-index: -1;
            transform: scale(1.1);
            opacity: 0.5; /* Allows the underlying gradient through */
            mix-blend-mode: screen; /* Makes the reds vibrant */
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        /* Album Cover */
        .album-art {
            width: 100%;
            max-width: 420px;
            aspect-ratio: 1/1;
            border-radius: 12px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            margin-bottom: 30px;
            transition: transform 0.4s ease;
        }
        
        .album-art:hover {
            transform: scale(1.025);
        }

        header {
            text-align: center;
            margin-bottom: 45px;
        }

        h1 {
            font-size: 2.8rem;
            letter-spacing: 4px;
            margin: 0;
            text-transform: uppercase;
            font-weight: 300;
            /* Minimal glowing effect on the title against the red */
            text-shadow: 0 0 10px rgba(255,255,255,0.4);
        }

        p.artist-name {
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: var(--text-sub);
            margin-top: 10px;
            font-weight: 300;
        }

        /* Music Links List */
        .links-container {
            width: 100%;
            max-width: 480px;
        }

        .link-card {
            display: flex;
            align-items: center;
            /* White glass on red background */
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            padding: 18px 25px;
            margin-bottom: 14px;
            text-decoration: none;
            color: var(--text-main);
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
        }

        .link-card:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-3px);
            /* Crimson accent on hover border */
            border-color: rgba(255, 255, 255, 0.7);
        }

        .link-card i {
            font-size: 1.6rem;
            width: 45px;
        }

        .service-name {
            flex-grow: 1;
            font-weight: 500;
            letter-spacing: 1.5px;
            font-size: 1.1rem;
        }

        .btn-play {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border: 1px solid var(--btn-accent);
            padding: 6px 14px;
            border-radius: 4px;
            opacity: 0.8;
            font-weight: 500;
        }

        footer {
            margin-top: 60px;
            font-size: 0.85rem;
            color: var(--text-sub);
            letter-spacing: 1.5px;
            font-weight: 300;
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            h1 { font-size: 2.1rem; }
            .album-art { max-width: 310px; }
            .service-name { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="container">
        
        <img src="SmokeAndBloodCover_8K.jpg" alt="Alaap Vilaap Album Cover" class="album-art">

        <header>
            <h1>Alaap Vilaap</h1>
            <p class="artist-name">Anuj Kamra</p>
        </header>

        <div class="links-container">
            <a href="https://open.spotify.com/album/5LPEpbFZD29MqWxcOcw4VT" class="link-card" target="_blank">
                <i class="fab fa-spotify" style="color: #1DB954;"></i>
                <span class="service-name">Spotify</span>
                <span class="btn-play">Listen</span>
            </a>

            <a href="https://music.apple.com/us/album/alaap-vilaap-ep/1882543507" class="link-card" target="_blank">
                <i class="fab fa-apple" style="color: #fcfcfc;"></i>
                <span class="service-name">Apple Music</span>
                <span class="btn-play">Listen</span>
            </a>

            <a href="https://music.amazon.com/albums/B0GR4YKYZX?marketplaceId=ATVPDKIKX0DER&musicTerritory=US&ref=dm_sh_lBf2jja076tiZMaUSa0JkncYz" class="link-card" target="_blank">
                <i class="fab fa-amazon" style="color: #FF9900;"></i>
                <span class="service-name">Amazon Music</span>
                <span class="btn-play">Listen</span>
            </a>

            <a href="#" class="link-card" target="_blank">
                <i class="fab fa-youtube" style="color: #FF0000;"></i>
                <span class="service-name">YouTube Music</span>
                <span class="btn-play">Coming Soon</span>
            </a>

            <a href="#" class="link-card" target="_blank">
                <i class="fab fa-instagram" style="color: #fcfcfc;"></i>
                <span class="service-name">Instagram Audio</span>
                <span class="btn-play">Available now</span>
            </a>

        </div>

        <footer>
            &copy; 2026 ANUJ KAMRA | ALL RIGHTS RESERVED
        </footer>

    </div>

</body>
</html>
